name: Daily image cleanup

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          package: resume
          use-regex: true
          skip-regex-checks: true
          exclude-tags: ^(?:nginx-|busybox-)?[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[^\s]+)?$
          keep-n-tagged: 10
          delete-partial-images: true
          delete-orphaned-images: true
          delete-ghost-images: true
          dry-run: false