name: Daily image cleanup dockerhub and ghcr

on:
  push:
    branches: ['cleanup-dockerhub']
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Clean Docker Hub
        uses: lostlink/docker-cleanup@v1.0.1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repositories: 'resume'
          pr-retention-days: 7
          sha-retention-days: 7
          dry-run: true
          custom-patterns: '{ "^(?:nginx-|busybox-)?[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[^\s]+)?$": 3652 }'




