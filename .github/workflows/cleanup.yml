name: Daily image cleanup dockerhub and ghcr

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Clean dockerhub
        uses: tripal/dockerhub_expire@28c78713e2906919ecd6effa08e01712135a5c20 # v1.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repositories: 'shennarwp/resume'
          rules: '^.*$:30, nginx-latest, busybox-latest'
          dry-run: false # Only set to false after you have tested

      - name: Clean ghcr
        uses: dataaxiom/ghcr-cleanup-action@d52806a0dc70b430571a37da1fde39733ffd640f # v1
        with:
          package: resume
          use-regex: true
          skip-regex-checks: true
          exclude-tags: ^(?:nginx-|busybox-)?[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[^\s]+)?$
          keep-n-tagged: 10
          delete-partial-images: true
          delete-orphaned-images: true
          delete-ghost-images: true
          dry-run: false
