name: Daily image cleanup dockerhub and ghcr

on:
  push:
    branches: ['cleanup-dockerhub']
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: DockerHub Cleanup Action
        uses: maxisam/dockerhub-cleanup@v0.1.8
        with:
          namespace: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}
          repos: 'resume'
          preserve_last: 25
          dry_run: true




