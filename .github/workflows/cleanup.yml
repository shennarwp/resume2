name: Daily image cleanup dockerhub and ghcr

on:
  push:
    branches: ['cleanup-dockerhub']
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Clean Docker Hub
        uses: tripal/dockerhub_expire@v1.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repositories: 'shennarwp/resume'
          rules: '"^(?:nginx-|busybox-)?[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[^\s]+)?$":30, latest'
          dry-run: true  # Only set to false after you have tested




