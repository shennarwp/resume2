name: Trigger auto deployment for resume

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/resume-AutoDeployTrigger-9bf4a222-9746-4504-92b3-a046069962c4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RESUME_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RESUME_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RESUME_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.RESUME_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RESUME_REGISTRY_PASSWORD }}
          containerAppName: resume
          resourceGroup: web
          imageToBuild: ghcr.io/shennarwp/resume:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


