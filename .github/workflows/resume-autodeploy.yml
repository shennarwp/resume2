name: Trigger auto deployment for resume

permissions: {}

on:
  push:
    branches-ignore:
      - 'renovate/**'
    tags:
      - '**'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  sonarqube:
    name: Scan code with sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to the branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test:
    name: Run frontend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to the branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.23.1

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test -- --run

  build-and-push:
    name: Build image and push to registries
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      packages: write # to publish to ghcr
      id-token: write
      contents: read
      attestations: write
    outputs:
      tag: ${{ steps.check-tag.outputs.TAG }}
      is_tag_deploy: ${{ steps.check-tag.outputs.IS_TAG_DEPLOY }}

    steps:
      - name: Collect workflow telemetry
        uses: Alaffia-Technology-Solutions/workflow-telemetry-action@bdadd22e6300d543bae275ed7380969384893c73 # v3.0.0

      - name: Checkout to the branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check tag and set outputs
        id: check-tag
        run: |
          IS_TAG_DEPLOY='false'
          TAG_NAME=""
          if [[ "${{ github.ref_type }}" == 'tag' ]]; then
              TAG_NAME="${GITHUB_REF#refs/*/}"
              echo "TAG=$TAG_NAME" >> "$GITHUB_OUTPUT"
              # Check if tag matches YYYY.MM.DD-freetext format
              if [[ "$TAG_NAME" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}(-[^\s]+)?$ ]]; then
                  IS_TAG_DEPLOY='true'
              fi
          else
              echo "TAG=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi
          echo "IS_TAG_DEPLOY=$IS_TAG_DEPLOY" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to dockerhub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and push busybox image
        id: build-push-busybox
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          platforms: linux/amd64,linux/arm64
          file: Dockerfile-busybox
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/resume:busybox-${{ steps.check-tag.outputs.TAG }}
            ghcr.io/${{ secrets.GHCR_USERNAME }}/resume:busybox-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/resume:busybox-${{ steps.check-tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/resume:busybox-latest

      - name: Build and push nginx image
        id: build-push-nginx
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          platforms: linux/amd64,linux/arm64
          file: Dockerfile-nginx
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/resume:nginx-${{ steps.check-tag.outputs.TAG }}
            ghcr.io/${{ secrets.GHCR_USERNAME }}/resume:nginx-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/resume:nginx-${{ steps.check-tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/resume:nginx-latest

      - name: Attest dockerhub image
        if: github.event_name == 'push' && (github.ref_type == 'branch' || steps.check-tag.outputs.IS_TAG_DEPLOY == 'true')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ secrets.DOCKERHUB_USERNAME }}/resume
          subject-digest: ${{ steps.build-push-busybox.outputs.digest }}

      - name: Attest ghcr image
        if: github.event_name == 'push' && (github.ref_type == 'branch' || steps.check-tag.outputs.IS_TAG_DEPLOY == 'true')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/${{ secrets.GHCR_USERNAME }}/resume
          subject-digest: ${{ steps.build-push-nginx.outputs.digest }}
          push-to-registry: true

  deploy-azure-container-apps:
    name: Deploy to azure container apps
    environment:
      name: azure
      url: https://resume.graysand-8af4e4eb.germanywestcentral.azurecontainerapps.io/
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
    needs: [build-and-push]
    env:
      DEPLOYED_TAG: ${{ needs.build-and-push.outputs.tag }}
    # Only run on tag pushes matching YYYY.MM.DD-freetext
    if: github.event_name == 'push' && github.ref_type == 'tag' && needs.build-and-push.outputs.is_tag_deploy == 'true'

    steps:
      - name: Azure login
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.RESUME_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RESUME_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RESUME_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to azure
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703 # v2
        with:
          containerAppName: resume
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINER_APP_ENVIRONMENT }}
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/${{ secrets.GHCR_USERNAME }}/resume:nginx-${{ env.DEPLOYED_TAG }}

  deploy-hetzner:
    name: Deploy to hetzner vm
    environment:
      name: hetzner
      url: https://shennarwp.com/cv-staging/
    runs-on: ubuntu-latest
    needs: [build-and-push]
    env:
      DEPLOYED_TAG: ${{ needs.build-and-push.outputs.tag }}

    steps:
      - name: Deploy to hetzner
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.PORT }}
          script: |
            docker stop resume || true \
            && docker rm resume || true \
            && docker run \
                 --detach \
                 --net nginx \
                 --name resume \
                 --restart always \
                 --expose 80 \
                 ${{ secrets.DOCKERHUB_USERNAME }}/resume:busybox-${{ env.DEPLOYED_TAG }} \
            && docker container restart nginx \
            && docker image prune --force

  deploy-oracle:
    name: Deploy to oracle vm
    environment:
      name: oracle
      url: https://shenna.rwpiri.com
    runs-on: ubuntu-latest
    needs: [build-and-push]
    env:
      DEPLOYED_TAG: ${{ needs.build-and-push.outputs.tag }}
    # Only run on tag pushes matching YYYY.MM.DD-freetext
    if: github.event_name == 'push' && github.ref_type == 'tag' && needs.build-and-push.outputs.is_tag_deploy == 'true'

    steps:
      - name: Deploy to oracle
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.RUIPRYUX_HOST }}
          username: ${{ secrets.RUIPRYUX_USERNAME }}
          key: ${{ secrets.KEY }}
          port: ${{ secrets.RUIPRYUX_PORT }}
          script: |
            docker stop resume || true \
            && docker rm resume || true \
            && docker run \
                 --detach \
                 --net nginx \
                 --name resume \
                 --restart always \
                 --expose 80 \
                 ${{ secrets.DOCKERHUB_USERNAME }}/resume:busybox-${{ env.DEPLOYED_TAG }} \
            && docker container restart nginx \
            && docker image prune --force

  deploy-azure-static-web:
    name: Deploy to azure static web
    environment:
      name: azure
      url: https://victorious-moss-02a509500.7.azurestaticapps.net/
    runs-on: ubuntu-latest
    needs: [build-and-push]
    # Only run on tag pushes matching YYYY.MM.DD-freetext
    if: github.event_name == 'push' && github.ref_type == 'tag' && needs.build-and-push.outputs.is_tag_deploy == 'true'

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_MOSS_02A509500 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: 'upload'
          app_location: '/' # App source code path
          api_location: '' # Api source code path - optional
          output_location: 'build' # Built app content directory - optional

  healthcheck-staging:
    name: Check staging url after deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-hetzner]

    steps:
      - name: Check the deployed service URL(s)
        uses: jtalk/url-health-check-action@e7d5ebdc9027fbf494d2d034f3e8fc78f8b7a2b9 # v5
        with:
          url: https://shennarwp.com/cv-staging/
          follow-redirect: false
          max-attempts: 5
          retry-delay: 10s
          retry-all: false

  healthcheck-all:
    name: Check all urls after deployment
    runs-on: ubuntu-latest
    needs:
      [
        build-and-push,
        deploy-azure-container-apps,
        deploy-hetzner,
        deploy-oracle,
        deploy-azure-static-web,
      ]
    if: github.event_name == 'push' && (github.ref_type == 'branch' || needs.build-and-push.outputs.is_tag_deploy == 'true')

    steps:
      - name: Check the deployed service URL(s)
        uses: jtalk/url-health-check-action@e7d5ebdc9027fbf494d2d034f3e8fc78f8b7a2b9 # v5
        with:
          url: https://shennarwp.com/cv-staging/|https://resume.graysand-8af4e4eb.germanywestcentral.azurecontainerapps.io/|https://victorious-moss-02a509500.7.azurestaticapps.net/|https://shenna.rwpiri.com
          follow-redirect: false
          max-attempts: 5
          retry-delay: 10s
          retry-all: false
